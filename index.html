<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="robots" content="index, follow" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!--=============== FAVICON ===============-->
        <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon" />

        <!--=============== REMIXICONS ===============-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" />

        <!--=============== SWIPER CSS ===============-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />

        <!--=============== CSS ===============-->
        <link rel="stylesheet" href="./assets/css/style.css" />

        <title>project</title>
    </head>
    <body>
        <!--==================== HEADER ====================-->
        <header class="header" id="header">
            <nav class="nav container">
                <a href="#" class="nav__logo">
                    <img src="./assets/images/logo-nike.svg" alt="" />
                </a>

                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li>
                            <a href="#" class="nav__link">Home</a>
                        </li>
                        <li>
                            <a href="#" class="nav__link">MEN</a>
                        </li>
                        <li>
                            <a href="#" class="nav__link">WOMEN</a>
                        </li>
                        <li>
                            <a href="#" class="nav__link">EXPLORE</a>
                        </li>
                    </ul>

                    <button class="nav__close" id="nav-close">
                        <i class="ri-close-large-line"></i>
                    </button>
                </div>

                <div class="nav__buttons">
                    <button class="nav__search">
                        <i class="ri-search-2-line"></i>
                    </button>

                    <button class="nav__shop">
                        <i class="ri-shopping-bag-line"></i>
                    </button>

                    <button class="nav__toggle" id="nav-toggle">
                        <i class="ri-menu-line"></i>
                    </button>
                </div>
            </nav>
        </header>

        <!--==================== MAIN ====================-->
        <main class="main">
            <!--==================== HOME ====================-->
            <section class="home">
                <div class="home__container container">
                    <div class="home__content">
                        <div class="h1 home__title">
                            <span
                                >Supreme X <br />
                                Nike MAG
                            </span>
                        </div>

                        <div class="home__data">
                            <span class="home__label">PRICE</span>
                            <h3 class="home__price">$350</h3>

                            <p class="home__variant">Best Collectible Sneakers</p>
                            <p class="home__date">Release Date: Nov 21 (Global)</p>
                            <p class="home__description">
                                Lorem ipsum dolor sit, amet consectetur adipisicing elit. Consectetur impedit
                                praesentium temporibus commodi! Id, consectetur.
                            </p>
                        </div>

                        <div class="home__buttons">
                            <button class="home__button-bag"><i class="ri-shopping-bag-line"></i> Add To Cart</button>
                            <button class="home__button-heart">
                                <i class="ri-heart-3-line"></i>
                            </button>
                        </div>
                    </div>

                    <div class="home__area">
                        <div class="home__blob-pink"></div>
                        <div class="home__blob-blue"></div>

                        <img src="./assets/images/logo-nike.svg" alt="" class="home__logo" />

                        <h2 class="home__name">NIKE</h2>

                        <div class="home__thumbs swiper" thumbsSlider="">
                            <div class="home__previews swiper-wrapper">
                                <button class="home__preview swiper-slide">
                                    <img src="./assets/images/sneakers-1.png" alt="" />
                                </button>
                                <button class="home__preview swiper-slide">
                                    <img src="./assets/images/sneakers-2.png" alt="" />
                                </button>
                                <button class="home__preview swiper-slide">
                                    <img src="./assets/images/sneakers-3.png" alt="" />
                                </button>
                            </div>
                        </div>

                        <div class="home__swiper swiper">
                            <div class="swiper-wrapper">
                                <article class="home__sneaker swiper-slide">
                                    <img src="./assets/images/sneakers-1.png" alt="" />
                                </article>
                                <article class="home__sneaker swiper-slide">
                                    <img src="./assets/images/sneakers-2.png" alt="" />
                                </article>
                                <article class="home__sneaker swiper-slide">
                                    <img src="./assets/images/sneakers-3.png" alt="" />
                                </article>
                            </div>
                        </div>

                        <div class="swiper-button-prev">
                            <i class="ri-arrow-left-long-line"></i>
                        </div>
                        <div class="swiper-button-next">
                            <i class="ri-arrow-right-long-line"></i>
                        </div>

                        <div class="swiper-pagination"></div>

                        <div class="home__sizes">
                            <div class="home__guide">
                                <h3>SIZE</h3>
                                <p>(Size Guide)</p>
                            </div>

                            <div class="home__options">
                                <label class="home__radio">
                                    <input type="radio" name="size" checked />
                                    <span class="home__check">S</span>
                                </label>
                                <label class="home__radio">
                                    <input type="radio" name="size" />
                                    <span class="home__check">M</span>
                                </label>
                                <label class="home__radio">
                                    <input type="radio" name="size" />
                                    <span class="home__check">L</span>
                                </label>
                                <label class="home__radio">
                                    <input type="radio" name="size" />
                                    <span class="home__check">XL</span>
                                </label>
                                <label class="home__radio">
                                    <input type="radio" name="size" />
                                    <span class="home__check">2XL</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!--=============== GSAP ===============-->
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>

        <!--=============== SWIPER JS ===============-->
        <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

        <!--=============== MAIN JS ===============-->
        <script src="./assets/js/main.js"></script>
    </body>
</html>
